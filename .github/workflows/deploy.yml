name: Deploy Velvet Stakes

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: betting-companion/package-lock.json

      - name: Install dependencies
        working-directory: betting-companion
        run: npm ci

      - name: Build static export
        working-directory: betting-companion
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy betting-companion/out --project-name ${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch main
